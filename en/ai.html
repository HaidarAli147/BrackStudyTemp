<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brack Study</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="/style.css">
  <meta name="google-adsense-account" content="ca-pub-4397239596468716">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>
<body>

  <video id="logo-video" autoplay loop muted playsinline>
    <source src="/logo.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <button class="lang" onclick="window.location.href='/index.html';">
    تغير اللغة
  </button>

  <nav class="top-sidebar">
    <a href="/en/index.html">Home</a>
    <a href="/en/python.html">Python</a>
    <a href="/en/website.html">Website</a>
    <a href="/en/ai.html">AI Agent</a>
  </nav>

  <main class="content">
    <div id="chatContainer">

      <header id="header">
        <h2>AI Programming Tutor</h2>
        <p>Ask about HTML, CSS, JavaScript, Python, Java, or Swift.</p>
      </header>

      <section id="chatHistory">
        </section>

      <footer id="inputControls">
        <div id="inputWrapper">
          <input type="text" id="userInput" placeholder="Ask your question here..." autocomplete="off">
          <button id="sendButton" onclick="sendMessage()">Send</button>
        </div>
        
        <div id="loadingIndicator">
          <span>AI is thinking...</span>
        </div>
      </footer>

    </div>
  </main>

  <script>
    // Replace with your deployed backend URL
    const PROXY_SERVER_URL = 'https://your-deployed-backend.com/api/tutor';

    const chatHistory = document.getElementById('chatHistory');
    const userInput = document.getElementById('userInput');
    const sendButton = document.getElementById('sendButton');
    const loadingIndicator = document.getElementById('loadingIndicator');

    function renderMessage(text, sender) {
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('message', sender);

      const contentDiv = document.createElement('div');
      contentDiv.classList.add('bubble', sender);
      contentDiv.textContent = text;

      messageDiv.appendChild(contentDiv);
      chatHistory.appendChild(messageDiv);
      chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    // Display initial message on load
    window.onload = () => {
      renderMessage("Hello! I'm your AI tutor. How can I help you with your web and coding concepts?", 'ai');
    };

    async function sendMessage() {
      const query = userInput.value.trim();
      if (!query) return;

      renderMessage(query, 'user');
      userInput.value = '';
      sendButton.disabled = true;
      loadingIndicator.style.display = 'block';

      try {
        const response = await fetch(PROXY_SERVER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });

        if (!response.ok) throw new Error(`Network response error`);

        const result = await response.json();
        // Adjusting for common API response structures
        const aiText = result?.reply || result?.candidates?.[0]?.content?.parts?.[0]?.text;
        
        renderMessage(aiText || "Sorry, I received an empty response.", 'ai');

      } catch (error) {
        console.error("Fetch Error:", error);
        renderMessage("Error: Could not connect to the AI agent.", 'ai');
      } finally {
        sendButton.disabled = false;
        loadingIndicator.style.display = 'none';
      }
    }

    userInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter' && !sendButton.disabled) {
        sendMessage();
      }
    });
  </script>
</body>
</html>
